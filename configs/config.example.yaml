# ai-ide-gateway 配置示例

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 100

postgres:
  host: "localhost"
  port: 5432
  user: "gateway"
  password: "password"
  database: "ai_gateway"
  max_open_conns: 50
  max_idle_conns: 10

kafka:
  brokers:
    - "localhost:9092"
  topic: "gateway-requests"
  compression: "snappy"

circuit_breaker:
  window_size: 10s
  error_threshold: 0.5
  half_open_timeout: 30s

rate_limit:
  user:
    capacity: 10000
    rate: 100
  app:
    capacity: 50000
    rate: 500
  model:
    capacity: 100000
    rate: 1000

logging:
  level: "info"
  format: "json"

monitoring:
  prometheus_port: 9090
